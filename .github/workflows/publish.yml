name: Maven Package

on:
  release:
    types: [ created ]

jobs:
  publish-maven-central:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # -----------------------------
      # GPG SETUP (CI SAFE)
      # -----------------------------
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: List GPG keys
        run: gpg --list-secret-keys --keyid-format LONG

      # -----------------------------
      # MAVEN SETTINGS (CENTRAL TOKEN)
      # -----------------------------
      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${{ secrets.MAVEN_CENTRAL_USERNAME }}</username>
                <password>${{ secrets.MAVEN_CENTRAL_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      # -----------------------------
      # BUILD + PUBLISH
      # -----------------------------
      - name: Build and publish
        run: mvn -B clean deploy -P deploy-maven-central
        env:
          GPG_TTY: ""

  publish-github-registry:
    name: Publish to GitHub Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          server-id: github
          java-version: 21
          distribution: temurin
      - name: Publish package
        run: mvn --batch-mode --activate-profiles "deploy-github-registry" deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
